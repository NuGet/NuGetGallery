name: NuGetGallery CI $(Build.BuildId)

trigger:
  branches:
    include:
      - main
      - dev
  batch: True

pr:
  branches:
    include:
      - "*"

variables:
  - name: BuildConfiguration
    value: Release
  - name: Codeql.Enabled
    value: true
  - name: NugetSecurityAnalysisWarningLevel
    value: none
  - name: nugetMultiFeedWarnLevel
    value: none
  - name: CommonPackageVersion
    value: $(CommonAssemblyVersion)-$(SemverFriendlyBranchName)-$(Build.BuildId)
  - name: CommonAssemblyVersion
    value: 5.0.0
  - name: GalleryPackageVersion
    value: $(GalleryAssemblyVersion)-$(SemverFriendlyBranchName)-$(Build.BuildId)
  - name: GalleryAssemblyVersion
    value: 5.0.0
  - name: JobsPackageVersion
    value: $(JobsAssemblyVersion)-$(SemverFriendlyBranchName)-$(Build.BuildId)
  - name: JobsAssemblyVersion
    value: 5.0.0
  - name: NuGetGalleryDirectory
    value: ng
  - name: NuGetGalleryPath
    value: $(Agent.BuildDirectory)\$(NuGetGalleryDirectory)
  - name: NuGetGalleryBranch
    value: $(Build.SourceBranchName)
  - name: SemverFriendlyBranchName
    value: ${{ replace(replace(variables['Build.SourceBranchName'], '_', '-'), '/', '-') }}

resources:
  repositories:
    - repository: self
      type: git
      ref: refs/heads/main

pool:
  name: NetCore-Public
  demands: ImageOverride -equals windows.vs2026.amd64.open

stages:
  - stage: common
    displayName: NuGet.Server.Common.sln
    dependsOn: []
    jobs:
      - job: build_and_test
        displayName: common build and test
        cancelTimeoutInMinutes: 1
        steps:
          - checkout: self
            fetchDepth: 1
            clean: true
            fetchTags: false
            path: $(NuGetGalleryDirectory)
          - task: UseDotNet@2
            displayName: Install .NET 8.0 SDK
            inputs:
              packageType: sdk
              version: 8.0.x
          - task: PowerShell@1
            name: build
            displayName: Build
            inputs:
              scriptName: $(NuGetGalleryPath)\build.ps1
              arguments: -Configuration $(BuildConfiguration) -BuildNumber $(Build.BuildId) -SkipArtifacts -SkipGallery -SkipJobs -CommonAssemblyVersion $(CommonAssemblyVersion) -CommonPackageVersion $(CommonPackageVersion) -GalleryAssemblyVersion $(GalleryAssemblyVersion) -GalleryPackageVersion $(GalleryPackageVersion) -JobsAssemblyVersion $(JobsAssemblyVersion) -JobsPackageVersion $(JobsPackageVersion) -Branch $(NuGetGalleryBranch) -CommitSHA $(Build.SourceVersion)
              workingFolder: $(NuGetGalleryPath)
          - task: PowerShell@1
            name: test
            displayName: Run tests
            inputs:
              scriptName: $(NuGetGalleryPath)\test.ps1
              arguments: -Configuration $(BuildConfiguration) -BuildNumber $(Build.BuildId) -SkipGallery -SkipJobs
              workingFolder: $(NuGetGalleryPath)
          - task: PublishTestResults@2
            name: publish_test_results
            displayName: Publish test results
            condition: succeededOrFailed()
            inputs:
              testRunner: VSTest
              testResultsFiles: $(NuGetGalleryPath)\Results.*.xml
              failTaskOnFailedTests: true

  - stage: gallery
    displayName: NuGetGallery.sln
    dependsOn: []
    jobs:
      - job: build_and_test
        displayName: gallery build and test
        cancelTimeoutInMinutes: 1
        steps:
          - checkout: self
            fetchDepth: 1
            clean: true
            fetchTags: false
            path: $(NuGetGalleryDirectory)
          - task: UseDotNet@2
            displayName: Install .NET 8.0 SDK
            inputs:
              packageType: sdk
              version: 8.0.x
          - task: PowerShell@1
            name: build
            displayName: Build
            inputs:
              scriptName: $(NuGetGalleryPath)\build.ps1
              arguments: -Configuration $(BuildConfiguration) -BuildNumber $(Build.BuildId) -SkipArtifacts -SkipCommon -SkipJobs -CommonAssemblyVersion $(CommonAssemblyVersion) -CommonPackageVersion $(CommonPackageVersion) -GalleryAssemblyVersion $(GalleryAssemblyVersion) -GalleryPackageVersion $(GalleryPackageVersion) -JobsAssemblyVersion $(JobsAssemblyVersion) -JobsPackageVersion $(JobsPackageVersion) -Branch $(NuGetGalleryBranch) -CommitSHA $(Build.SourceVersion)
              workingFolder: $(NuGetGalleryPath)
          - task: PowerShell@1
            name: setup_dev
            displayName: Setup Dev Environment
            inputs:
              scriptName: $(NuGetGalleryPath)\tools\Setup-DevEnvironment.ps1
              workingFolder: $(NuGetGalleryPath)
          - task: PowerShell@1
            name: test
            displayName: Run tests
            inputs:
              scriptName: $(NuGetGalleryPath)\test.ps1
              arguments: -Configuration $(BuildConfiguration) -BuildNumber $(Build.BuildId) -SkipCommon -SkipJobs
              workingFolder: $(NuGetGalleryPath)
          - task: PublishTestResults@2
            name: publish_test_results
            displayName: Publish test results
            condition: succeededOrFailed()
            inputs:
              testRunner: VSTest
              testResultsFiles: $(NuGetGalleryPath)\Results.*.xml
              failTaskOnFailedTests: true

  - stage: statslogparser
    displayName: StatsLogPasrser
    dependsOn: []
    jobs:
      - job: build_and_test
        displayName: statslogparser build and test
        cancelTimeoutInMinutes: 1
        variables:
          PIPX_HOME: $(Agent.ToolsDirectory)\pipx
        steps:
          - checkout: self
            fetchDepth: 1
            clean: true
            fetchTags: false
            path: $(NuGetGalleryDirectory)
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.10'
          - script: |
              python -m pip install --user pipx
              set PATH=%USERPROFILE%\.local\bin;%PATH%
              pipx install poetry
              poetry install
              poetry build
              poetry run pytest tests/ --cov loginterpretation --cov-report html
            displayName: 'Install tools and run tests'
            workingDirectory: $(NuGetGalleryPath)\python\StatsLogParser
          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: $(NuGetGalleryPath)\python\StatsLogParser\dist
              artifact: StatsLogParser

  - stage: jobs
    displayName: NuGet.Jobs.sln
    dependsOn: []
    jobs:
      - job: build_and_test
        displayName: jobs build and test
        cancelTimeoutInMinutes: 1
        steps:
          - checkout: self
            fetchDepth: 1
            clean: true
            fetchTags: false
            path: $(NuGetGalleryDirectory)
          - task: UseDotNet@2
            displayName: Install .NET 8.0 SDK
            inputs:
              packageType: sdk
              version: 8.0.x
          - task: PowerShell@1
            name: build
            displayName: Build
            inputs:
              scriptName: $(NuGetGalleryPath)\build.ps1
              arguments: -Configuration $(BuildConfiguration) -BuildNumber $(Build.BuildId) -SkipArtifacts -SkipCommon -SkipGallery -CommonAssemblyVersion $(CommonAssemblyVersion) -CommonPackageVersion $(CommonPackageVersion) -GalleryAssemblyVersion $(GalleryAssemblyVersion) -GalleryPackageVersion $(GalleryPackageVersion) -JobsAssemblyVersion $(JobsAssemblyVersion) -JobsPackageVersion $(JobsPackageVersion) -Branch $(NuGetGalleryBranch) -CommitSHA $(Build.SourceVersion)
              workingFolder: $(NuGetGalleryPath)
          - task: PowerShell@1
            name: test
            displayName: Run tests
            inputs:
              scriptName: $(NuGetGalleryPath)\test.ps1
              arguments: -Configuration $(BuildConfiguration) -BuildNumber $(Build.BuildId) -SkipCommon -SkipGallery
              workingFolder: $(NuGetGalleryPath)
          - task: PublishTestResults@2
            name: publish_test_results
            displayName: Publish test results
            condition: succeededOrFailed()
            inputs:
              testRunner: VSTest
              testResultsFiles: $(NuGetGalleryPath)\Results.*.xml
              failTaskOnFailedTests: true

  - stage: devenv
    displayName: Dev Environment & Azurite
    dependsOn: []
    jobs:
      - job: setup_and_azurite
        displayName: setup dev environment and azurite
        cancelTimeoutInMinutes: 1
        steps:
          - checkout: self
            fetchDepth: 1
            clean: true
            fetchTags: false
            path: $(NuGetGalleryDirectory)
          - task: UseDotNet@2
            displayName: Install .NET 8.0 SDK
            inputs:
              packageType: sdk
              version: 8.0.x
          - task: PowerShell@1
            name: build
            displayName: Build Gallery
            inputs:
              scriptName: $(NuGetGalleryPath)\build.ps1
              arguments: -Configuration $(BuildConfiguration) -BuildNumber $(Build.BuildId) -SkipArtifacts -SkipCommon -SkipJobs -CommonAssemblyVersion $(CommonAssemblyVersion) -CommonPackageVersion $(CommonPackageVersion) -GalleryAssemblyVersion $(GalleryAssemblyVersion) -GalleryPackageVersion $(GalleryPackageVersion) -JobsAssemblyVersion $(JobsAssemblyVersion) -JobsPackageVersion $(JobsPackageVersion) -Branch $(NuGetGalleryBranch) -CommitSHA $(Build.SourceVersion)
              workingFolder: $(NuGetGalleryPath)
          - task: PowerShell@1
            name: setup_dev
            displayName: Setup Dev Environment
            inputs:
              scriptName: $(NuGetGalleryPath)\tools\Setup-DevEnvironment.ps1
              workingFolder: $(NuGetGalleryPath)
          - task: UseDotNet@2
            displayName: Install .NET 10.0 SDK
            inputs:
              packageType: sdk
              version: 10.0.x
              includePreviewVersions: true
          - powershell: |
              Write-Host "=== Checking Docker availability ==="
              $dockerPath = Get-Command docker -ErrorAction SilentlyContinue
              if ($dockerPath) {
                  Write-Host "Docker found at: $($dockerPath.Source)"
                  docker version
                  docker info
              }
              else {
                  Write-Host "Docker is NOT installed on this agent."
              }

              Write-Host ""
              Write-Host "=== Agent OS info ==="
              Write-Host "OSType from docker info (if available) determines Linux vs Windows container support."
              Write-Host "This agent runs Windows Server - Azurite Linux image won't work via Docker."
              Write-Host "Using npx azurite instead."
            displayName: Docker Check (informational)
            workingDirectory: $(NuGetGalleryPath)
          - powershell: |
              Write-Host "=== Installing and starting Azurite via npm ==="
              npm install -g azurite
              if ($LASTEXITCODE -ne 0) {
                  Write-Error "Failed to install Azurite via npm."
                  exit 1
              }

              Write-Host "=== Starting Azurite in background ==="
              $azuriteProcess = Start-Process -FilePath "azurite" -ArgumentList "--silent", "--location", "$env:TEMP\azurite", "--blobPort", "10000", "--queuePort", "10001", "--tablePort", "10002" -PassThru -NoNewWindow
              Write-Host "Azurite started with PID: $($azuriteProcess.Id)"

              Write-Host "=== Polling Azurite blob endpoint ==="
              $maxRetries = 30
              $retryInterval = 10
              $endpoint = "http://127.0.0.1:10000/"
              $success = $false

              for ($i = 1; $i -le $maxRetries; $i++) {
                  Write-Host "Attempt $i of $maxRetries..."
                  try {
                      $response = Invoke-WebRequest -Uri $endpoint -UseBasicParsing -TimeoutSec 5 -ErrorAction Stop
                      Write-Host "Azurite responded with status $($response.StatusCode)"
                      $success = $true
                      break
                  }
                  catch {
                      $ex = $_.Exception
                      if ($ex -and $ex.Response) {
                          $statusCode = [int]$ex.Response.StatusCode
                          Write-Host "Azurite responded with status $statusCode - service is up!"
                          $success = $true
                          break
                      }
                      Write-Host "Connection failed: $($_.Exception.Message). Retrying in $retryInterval seconds..."
                      Start-Sleep -Seconds $retryInterval
                  }
              }

              if (-not $success) {
                  if ($azuriteProcess.HasExited) {
                      Write-Host "Azurite process exited with code: $($azuriteProcess.ExitCode)"
                  }
                  Write-Error "Azurite did not become available within $($maxRetries * $retryInterval) seconds."
                  exit 1
              }

              Write-Host "=== Azurite is running and responsive ==="
              Write-Host "Blob:  http://127.0.0.1:10000/"
              Write-Host "Queue: http://127.0.0.1:10001/"
              Write-Host "Table: http://127.0.0.1:10002/"
              Write-Host "PID:   $($azuriteProcess.Id)"
            displayName: Start Azurite & Verify
            workingDirectory: $(NuGetGalleryPath)

  - stage: artifacts
    displayName: Artifacts
    dependsOn: []
    jobs:
      - job: build_artifacts
        displayName: build
        cancelTimeoutInMinutes: 1
        steps:
          - checkout: self
            fetchDepth: 1
            clean: true
            fetchTags: false
            path: $(NuGetGalleryDirectory)
          - task: UseDotNet@2
            displayName: Install .NET 8.0 SDK
            inputs:
              packageType: sdk
              version: 8.0.x
          - task: PowerShell@1
            name: build_artifacts
            displayName: Build
            inputs:
              scriptName: $(NuGetGalleryPath)\build.ps1
              arguments: -Configuration $(BuildConfiguration) -BuildNumber $(Build.BuildId) -CommonAssemblyVersion $(CommonAssemblyVersion) -CommonPackageVersion $(CommonPackageVersion) -GalleryAssemblyVersion $(GalleryAssemblyVersion) -GalleryPackageVersion $(GalleryPackageVersion) -JobsAssemblyVersion $(JobsAssemblyVersion) -JobsPackageVersion $(JobsPackageVersion) -Branch $(NuGetGalleryBranch) -CommitSHA $(Build.SourceVersion)
              workingFolder: $(NuGetGalleryPath)
