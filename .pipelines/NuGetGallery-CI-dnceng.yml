name: NuGetGallery CI $(Build.BuildId)

trigger:
  branches:
    include:
      - main
      - dev
  batch: True

pr:
  branches:
    include:
      - "*"

variables:
  - name: BuildConfiguration
    value: Release
  - name: Codeql.Enabled
    value: true
  - name: NugetSecurityAnalysisWarningLevel
    value: none
  - name: nugetMultiFeedWarnLevel
    value: none
  - name: CommonPackageVersion
    value: $(CommonAssemblyVersion)-$(SemverFriendlyBranchName)-$(Build.BuildId)
  - name: CommonAssemblyVersion
    value: 5.0.0
  - name: GalleryPackageVersion
    value: $(GalleryAssemblyVersion)-$(SemverFriendlyBranchName)-$(Build.BuildId)
  - name: GalleryAssemblyVersion
    value: 5.0.0
  - name: JobsPackageVersion
    value: $(JobsAssemblyVersion)-$(SemverFriendlyBranchName)-$(Build.BuildId)
  - name: JobsAssemblyVersion
    value: 5.0.0
  - name: NuGetGalleryDirectory
    value: ng
  - name: NuGetGalleryPath
    value: $(Agent.BuildDirectory)\$(NuGetGalleryDirectory)
  - name: NuGetGalleryBranch
    value: $(Build.SourceBranchName)
  - name: SemverFriendlyBranchName
    value: ${{ replace(replace(variables['Build.SourceBranchName'], '_', '-'), '/', '-') }}
  - name: DOTNET_SKIP_FIRST_TIME_EXPERIENCE
    value: true
  - name: DOTNET_NOLOGO
    value: true

resources:
  repositories:
    - repository: self
      type: git
      ref: refs/heads/main

pool:
  name: NetCore-Public
  demands: ImageOverride -equals windows.vs2026.amd64.open

stages:
  - stage: common
    displayName: NuGet.Server.Common.sln
    dependsOn: []
    jobs:
      - job: build_and_test
        displayName: common build and test
        cancelTimeoutInMinutes: 1
        steps:
          - checkout: self
            fetchDepth: 1
            clean: true
            fetchTags: false
            path: $(NuGetGalleryDirectory)
          - task: PowerShell@1
            name: build
            displayName: Build
            inputs:
              scriptName: $(NuGetGalleryPath)\build.ps1
              arguments: -Configuration $(BuildConfiguration) -BuildNumber $(Build.BuildId) -SkipArtifacts -SkipGallery -SkipJobs -CommonAssemblyVersion $(CommonAssemblyVersion) -CommonPackageVersion $(CommonPackageVersion)-GalleryAssemblyVersion $(GalleryAssemblyVersion) -GalleryPackageVersion $(GalleryPackageVersion) -JobsAssemblyVersion $(JobsAssemblyVersion) -JobsPackageVersion $(JobsPackageVersion) -Branch $(NuGetGalleryBranch) -CommitSHA $(Build.SourceVersion)
              workingFolder: $(NuGetGalleryPath)
          - task: PowerShell@1
            name: test
            displayName: Run tests
            inputs:
              scriptName: $(NuGetGalleryPath)\test.ps1
              arguments: -Configuration $(BuildConfiguration) -BuildNumber $(Build.BuildId) -SkipGallery -SkipJobs
              workingFolder: $(NuGetGalleryPath)
          - task: PublishTestResults@2
            name: publish_test_results
            displayName: Publish test results
            condition: succeededOrFailed()
            inputs:
              testRunner: VSTest
              testResultsFiles: $(NuGetGalleryPath)\Results.*.xml
              failTaskOnFailedTests: true

  - stage: gallery
    displayName: NuGetGallery.sln
    dependsOn: []
    jobs:
      - job: build_and_test
        displayName: gallery build and test
        cancelTimeoutInMinutes: 1
        steps:
          - checkout: self
            fetchDepth: 1
            clean: true
            fetchTags: false
            path: $(NuGetGalleryDirectory)
          - task: PowerShell@1
            name: build
            displayName: Build
            inputs:
              scriptName: $(NuGetGalleryPath)\build.ps1
              arguments: -Configuration $(BuildConfiguration) -BuildNumber $(Build.BuildId) -SkipArtifacts -SkipCommon -SkipJobs -CommonAssemblyVersion $(CommonAssemblyVersion) -CommonPackageVersion $(CommonPackageVersion) -GalleryAssemblyVersion $(GalleryAssemblyVersion) -GalleryPackageVersion $(GalleryPackageVersion) -JobsAssemblyVersion $(JobsAssemblyVersion) -JobsPackageVersion $(JobsPackageVersion) -Branch $(NuGetGalleryBranch) -CommitSHA $(Build.SourceVersion)
              workingFolder: $(NuGetGalleryPath)
          - task: PowerShell@1
            name: setup_dev
            displayName: Setup Dev Environment
            inputs:
              scriptName: $(NuGetGalleryPath)\tools\Setup-DevEnvironment.ps1
              workingFolder: $(NuGetGalleryPath)
          - task: PowerShell@1
            name: test
            displayName: Run tests
            inputs:
              scriptName: $(NuGetGalleryPath)\test.ps1
              arguments: -Configuration $(BuildConfiguration) -BuildNumber $(Build.BuildId) -SkipCommon -SkipJobs
              workingFolder: $(NuGetGalleryPath)
          - task: PublishTestResults@2
            name: publish_test_results
            displayName: Publish test results
            condition: succeededOrFailed()
            inputs:
              testRunner: VSTest
              testResultsFiles: $(NuGetGalleryPath)\Results.*.xml
              failTaskOnFailedTests: true

  - stage: statslogparser
    displayName: StatsLogPasrser
    dependsOn: []
    jobs:
      - job: build_and_test
        displayName: statslogparser build and test
        cancelTimeoutInMinutes: 1
        variables:
          PIPX_HOME: $(Agent.ToolsDirectory)\pipx
        steps:
          - checkout: self
            fetchDepth: 1
            clean: true
            fetchTags: false
            path: $(NuGetGalleryDirectory)
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.10'
          - script: |
              python -m pip install --user pipx
              set PATH=%USERPROFILE%\.local\bin;%PATH%
              pipx install poetry
              poetry install
              poetry build
              poetry run pytest tests/ --cov loginterpretation --cov-report html
            displayName: 'Install tools and run tests'
            workingDirectory: $(NuGetGalleryPath)\python\StatsLogParser
          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: $(NuGetGalleryPath)\python\StatsLogParser\dist
              artifact: StatsLogParser

  - stage: jobs
    displayName: NuGet.Jobs.sln
    dependsOn: []
    jobs:
      - job: build_and_test
        displayName: jobs build and test
        cancelTimeoutInMinutes: 1
        steps:
          - checkout: self
            fetchDepth: 1
            clean: true
            fetchTags: false
            path: $(NuGetGalleryDirectory)
          - task: PowerShell@1
            name: build
            displayName: Build
            inputs:
              scriptName: $(NuGetGalleryPath)\build.ps1
              arguments: -Configuration $(BuildConfiguration) -BuildNumber $(Build.BuildId) -SkipArtifacts -SkipCommon -SkipGallery -CommonAssemblyVersion $(CommonAssemblyVersion) -CommonPackageVersion $(CommonPackageVersion) -GalleryAssemblyVersion $(GalleryAssemblyVersion) -GalleryPackageVersion $(GalleryPackageVersion) -JobsAssemblyVersion $(JobsAssemblyVersion) -JobsPackageVersion $(JobsPackageVersion) -Branch $(NuGetGalleryBranch) -CommitSHA $(Build.SourceVersion)
              workingFolder: $(NuGetGalleryPath)
          - task: PowerShell@1
            name: test
            displayName: Run tests
            inputs:
              scriptName: $(NuGetGalleryPath)\test.ps1
              arguments: -Configuration $(BuildConfiguration) -BuildNumber $(Build.BuildId) -SkipCommon -SkipGallery
              workingFolder: $(NuGetGalleryPath)
          - task: PublishTestResults@2
            name: publish_test_results
            displayName: Publish test results
            condition: succeededOrFailed()
            inputs:
              testRunner: VSTest
              testResultsFiles: $(NuGetGalleryPath)\Results.*.xml
              failTaskOnFailedTests: true

  - stage: devenv
    displayName: Dev Environment & Azurite
    dependsOn: []
    jobs:
      - job: setup_and_azurite
        displayName: setup dev environment and azurite
        cancelTimeoutInMinutes: 1
        steps:
          - checkout: self
            fetchDepth: 1
            clean: true
            fetchTags: false
            path: $(NuGetGalleryDirectory)
          - task: PowerShell@1
            name: build
            displayName: Build Gallery
            inputs:
              scriptName: $(NuGetGalleryPath)\build.ps1
              arguments: -Configuration $(BuildConfiguration) -BuildNumber $(Build.BuildId) -SkipArtifacts -SkipCommon -SkipJobs -CommonAssemblyVersion $(CommonAssemblyVersion) -CommonPackageVersion $(CommonPackageVersion) -GalleryAssemblyVersion $(GalleryAssemblyVersion) -GalleryPackageVersion $(GalleryPackageVersion) -JobsAssemblyVersion $(JobsAssemblyVersion) -JobsPackageVersion $(JobsPackageVersion) -Branch $(NuGetGalleryBranch) -CommitSHA $(Build.SourceVersion)
              workingFolder: $(NuGetGalleryPath)
          - task: PowerShell@1
            name: setup_dev
            displayName: Setup Dev Environment
            inputs:
              scriptName: $(NuGetGalleryPath)\tools\Setup-DevEnvironment.ps1
              workingFolder: $(NuGetGalleryPath)
          - powershell: |
              Write-Host "=== Building NuGetGallery.AppHost ==="
              dotnet build $(NuGetGalleryPath)\src\NuGetGallery.AppHost\NuGetGallery.AppHost.csproj -c $(BuildConfiguration)
              if ($LASTEXITCODE -ne 0) {
                  Write-Error "AppHost build failed."
                  exit 1
              }
              Write-Host "AppHost build succeeded."
            displayName: Build AppHost
            workingDirectory: $(NuGetGalleryPath)
          - powershell: |
              Write-Host "=== Pre-flight: check bin directory and fix applicationhost.config ==="
              $binDir = "$(NuGetGalleryPath)\src\NuGetGallery\bin"
              Write-Host "Bin dir: $binDir"
              Write-Host "Bin dir exists: $(Test-Path $binDir)"
              $configDlls = @(
                  "Microsoft.ApplicationServer.Caching.Core.dll",
                  "EntityFramework.dll",
                  "NuGetGallery.dll",
                  "NuGetGallery.Core.dll",
                  "System.Web.Mvc.dll"
              )
              foreach ($dll in $configDlls) {
                  $dllPath = Join-Path $binDir $dll
                  $exists = Test-Path $dllPath
                  Write-Host "  $dll : $exists"
                  if ($exists) {
                      try {
                          $asm = [System.Reflection.Assembly]::LoadFrom($dllPath)
                          Write-Host "    Loaded OK: $($asm.FullName)"
                      } catch {
                          Write-Host "    LOAD ERROR: $($_.Exception.Message)"
                          if ($_.Exception.InnerException) {
                              Write-Host "    INNER: $($_.Exception.InnerException.Message)"
                          }
                      }
                  }
              }
              Write-Host "Total DLLs in bin: $((Get-ChildItem $binDir -Filter *.dll -ErrorAction SilentlyContinue).Count)"

              # Fix relative physicalPath in applicationhost.config to absolute
              $configPath = "$(NuGetGalleryPath)\.vs\config\applicationhost.config"
              $absPhysPath = "$(NuGetGalleryPath)\src\NuGetGallery"
              Write-Host "Fixing physicalPath to: $absPhysPath"
              $content = Get-Content $configPath -Raw
              $content = $content -replace 'physicalPath="\.\.\\\.\.\\src\\NuGetGallery"', "physicalPath=""$absPhysPath"""
              Set-Content $configPath -Value $content
              # Verify
              Select-String -Path $configPath -Pattern "physicalPath" | ForEach-Object { Write-Host $_.Line.Trim() }

              # Also test direct IIS Express launch (fixed arg format)
              Write-Host "=== Testing IIS Express directly ==="
              $env:IIS_USER_HOME = "$(NuGetGalleryPath)\.vs"
              $iisUserHome = "$(NuGetGalleryPath)\.vs"
              @("config", "Logs", "TraceLogFiles") | ForEach-Object {
                  New-Item -ItemType Directory -Path (Join-Path $iisUserHome $_) -Force | Out-Null
              }
              $aspnetCfg = Join-Path $iisUserHome "config\aspnet.config"
              if (-not (Test-Path $aspnetCfg)) {
                  $template = Join-Path $env:ProgramFiles "IIS Express\config\templates\PersonalWebServer\aspnet.config"
                  if (Test-Path $template) { Copy-Item $template $aspnetCfg }
              }

              $iisExe = Join-Path $env:ProgramFiles "IIS Express\iisexpress.exe"
              $args = @("/config:$configPath", "/site:NuGet Gallery (localhost)", "/userhome:$iisUserHome")
              Write-Host "IIS Express: $iisExe"
              Write-Host "Args: $($args -join ' ')"

              $iisProc = Start-Process -FilePath $iisExe -ArgumentList $args `
                  -PassThru -RedirectStandardOutput "$(NuGetGalleryPath)\iis-stdout.log" -RedirectStandardError "$(NuGetGalleryPath)\iis-stderr.log"

              Write-Host "IIS Express started with PID $($iisProc.Id)"
              Start-Sleep -Seconds 15

              if ($iisProc.HasExited) {
                  Write-Host "IIS Express exited with code $($iisProc.ExitCode)"
                  Write-Host "=== stdout ==="
                  Get-Content "$(NuGetGalleryPath)\iis-stdout.log" -ErrorAction SilentlyContinue
                  Write-Host "=== stderr ==="
                  Get-Content "$(NuGetGalleryPath)\iis-stderr.log" -ErrorAction SilentlyContinue
              } else {
                  Write-Host "IIS Express is running, testing health probe..."
                  $curlOutput = & curl.exe -s -o "$(NuGetGalleryPath)\iis-response.txt" -w "%{http_code}" "http://localhost/api/health-probe" --max-time 10 2>$null
                  Write-Host "Health probe status: $curlOutput"
                  $body = Get-Content "$(NuGetGalleryPath)\iis-response.txt" -Raw -ErrorAction SilentlyContinue
                  if ($body) {
                      $textOnly = $body -replace '<style[^>]*>.*?</style>', '' -replace '<script[^>]*>.*?</script>', '' -replace '<[^>]+>', ' ' -replace '\s+', ' '
                      Write-Host "Response: $($textOnly.Substring(0, [Math]::Min(2000, $textOnly.Length)))"
                  }

                  # Check event log for details
                  Write-Host "=== Recent ASP.NET errors ==="
                  Get-EventLog -LogName Application -EntryType Error -Source "ASP.NET*" -Newest 3 -ErrorAction SilentlyContinue | ForEach-Object {
                      Write-Host "$($_.TimeGenerated) $($_.Message)"
                      if ($_.Data) {
                          $dataStr = [System.Text.Encoding]::UTF8.GetString($_.Data)
                          Write-Host "  DATA: $dataStr"
                      }
                  }

                  # Check ASP.NET temp files for compilation errors
                  $tempDir = Join-Path $env:LOCALAPPDATA "Temp\Temporary ASP.NET Files"
                  Write-Host "=== ASP.NET Temp Files ==="
                  if (Test-Path $tempDir) {
                      Get-ChildItem $tempDir -Recurse -Filter "*.err" -ErrorAction SilentlyContinue | ForEach-Object {
                          Write-Host "Error file: $($_.FullName)"
                          Get-Content $_.FullName -ErrorAction SilentlyContinue | Write-Host
                      }
                      Get-ChildItem $tempDir -Recurse -ErrorAction SilentlyContinue | Select-Object -First 20 | ForEach-Object {
                          Write-Host "  $($_.FullName)"
                      }
                  } else {
                      Write-Host "Temp dir not found: $tempDir"
                  }

                  Stop-Process -Id $iisProc.Id -Force -ErrorAction SilentlyContinue
              }
            displayName: Test IIS Express Directly
            workingDirectory: $(NuGetGalleryPath)
          - powershell: |
              Write-Host "=== Starting Aspire AppHost (ci-gallery profile) ==="
              $env:APPHOST_PROFILE = "ci-gallery"
              $env:DOTNET_ASPIRE_SHOW_DASHBOARD_RESOURCES = "false"
              $env:ASPNETCORE_URLS = "http://localhost:15888"
              $env:ASPIRE_DASHBOARD_OTLP_ENDPOINT_URL = "http://localhost:18889"
              $env:ASPIRE_ALLOW_UNSECURED_TRANSPORT = "true"
              $env:ASPIRE_RESOURCE_SERVICE_ENDPOINT_URL = "http://localhost:18890"
              $env:IIS_USER_HOME = "$(NuGetGalleryPath)\.vs"

              # Ensure IIS Express user home directories exist
              $iisUserHome = "$(NuGetGalleryPath)\.vs"
              @("config", "Logs", "TraceLogFiles") | ForEach-Object {
                  New-Item -ItemType Directory -Path (Join-Path $iisUserHome $_) -Force | Out-Null
              }
              # Copy aspnet.config if missing
              $aspnetCfg = Join-Path $iisUserHome "config\aspnet.config"
              if (-not (Test-Path $aspnetCfg)) {
                  $template = Join-Path $env:ProgramFiles "IIS Express\config\templates\PersonalWebServer\aspnet.config"
                  if (Test-Path $template) { Copy-Item $template $aspnetCfg }
              }
              Write-Host "IIS_USER_HOME = $iisUserHome"
              Write-Host "aspnet.config exists: $(Test-Path $aspnetCfg)"

              # Verify Gallery prerequisites
              $gallerySrc = "$(NuGetGalleryPath)\src\NuGetGallery"
              Write-Host "Web.config exists: $(Test-Path (Join-Path $gallerySrc 'Web.config'))"
              Write-Host "NuGetGallery.dll exists: $(Test-Path (Join-Path $gallerySrc 'bin\NuGetGallery.dll'))"
              Write-Host "EntityFramework.dll exists: $(Test-Path (Join-Path $gallerySrc 'bin\EntityFramework.dll'))"
              Write-Host "appsettings.Aspire.config exists: $(Test-Path (Join-Path $gallerySrc 'appsettings.Aspire.config'))"
              Write-Host "applicationhost.config exists: $(Test-Path '$(NuGetGalleryPath)\.vs\config\applicationhost.config')"

              $proc = Start-Process -FilePath "dotnet" `
                  -ArgumentList "run","--project","$(NuGetGalleryPath)\src\NuGetGallery.AppHost\NuGetGallery.AppHost.csproj","-c","$(BuildConfiguration)","--no-build","--no-launch-profile" `
                  -PassThru -RedirectStandardOutput "$(NuGetGalleryPath)\aspire-stdout.log" -RedirectStandardError "$(NuGetGalleryPath)\aspire-stderr.log"

              Write-Host "AppHost started with PID $($proc.Id)"

              # Wait for Aspire to initialize
              Start-Sleep -Seconds 20

              $maxWait = 300
              $elapsed = 20
              $healthy = $false
              $bodyLogged = $false
              while ($elapsed -lt $maxWait) {
                  if ($proc.HasExited) {
                      Write-Host "=== AppHost stdout ==="
                      Get-Content "$(NuGetGalleryPath)\aspire-stdout.log" -ErrorAction SilentlyContinue
                      Write-Host "=== AppHost stderr ==="
                      Get-Content "$(NuGetGalleryPath)\aspire-stderr.log" -ErrorAction SilentlyContinue
                      Write-Error "AppHost exited prematurely with code $($proc.ExitCode)."
                      exit 1
                  }

                  # Try health probe and capture response body on error
                  $curlOutput = & curl.exe -s -o "$(NuGetGalleryPath)\health-response.txt" -w "%{http_code}" "http://localhost/api/health-probe" --max-time 5 2>$null
                  $httpCode = $curlOutput
                  if ($httpCode -eq "200") {
                      Write-Host "Gallery is healthy! Status: 200"
                      $healthy = $true
                      break
                  } else {
                      Write-Host "Waiting for Gallery... ($elapsed s) Status=$httpCode"
                      if (-not $bodyLogged -and $httpCode -and $httpCode -ne "000") {
                          $bodyContent = Get-Content "$(NuGetGalleryPath)\health-response.txt" -Raw -ErrorAction SilentlyContinue
                          if ($bodyContent) {
                              $textOnly = $bodyContent -replace '<style[^>]*>.*?</style>', '' -replace '<script[^>]*>.*?</script>', '' -replace '<[^>]+>', ' ' -replace '\s+', ' '
                              Write-Host "Response (text): $($textOnly.Substring(0, [Math]::Min(4000, $textOnly.Length)))"
                              $bodyLogged = $true
                          }
                      }
                  }

                  Start-Sleep -Seconds 15
                  $elapsed += 15
              }

              Write-Host "=== AppHost stdout (last 100 lines) ==="
              Get-Content "$(NuGetGalleryPath)\aspire-stdout.log" -Tail 100 -ErrorAction SilentlyContinue
              Write-Host "=== AppHost stderr (last 100 lines) ==="
              Get-Content "$(NuGetGalleryPath)\aspire-stderr.log" -Tail 100 -ErrorAction SilentlyContinue

              # Check Windows Event Log for ASP.NET errors
              Write-Host "=== Recent Application Event Log errors ==="
              Get-EventLog -LogName Application -EntryType Error -Newest 20 -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "$($_.TimeGenerated) [$($_.Source)] $($_.Message)" }

              # Check for ASP.NET-specific events with full message
              Write-Host "=== ASP.NET WinEvents ==="
              Get-WinEvent -FilterHashtable @{LogName='Application'; ProviderName='ASP.NET 4.0.30319.0'; Level=2} -MaxEvents 5 -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "$($_.TimeCreated) $($_.Message)" }

              # Check if appsettings.Aspire.config was generated
              Write-Host "=== appsettings.Aspire.config check ==="
              $aspireConfig = "$(NuGetGalleryPath)\src\NuGetGallery\appsettings.Aspire.config"
              Write-Host "appsettings.Aspire.config exists now: $(Test-Path $aspireConfig)"
              if (Test-Path $aspireConfig) { Get-Content $aspireConfig }

              # Check .NET Framework version
              Write-Host "=== .NET Framework version ==="
              Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\NET Framework Setup\NDP\v4\Full" -ErrorAction SilentlyContinue | Select-Object -Property Release,Version | Format-List

              # Check ASP.NET registration
              Write-Host "=== ASP.NET 4.x registration ==="
              Test-Path "$env:windir\Microsoft.NET\Framework64\v4.0.30319\aspnet_isapi.dll"

              # Check IIS Express trace logs
              Write-Host "=== IIS Express Trace Logs ==="
              $tracePath = "C:\Users\cloudtest\Documents\IISExpress\TraceLogFiles"
              if (Test-Path $tracePath) {
                  Get-ChildItem $tracePath -Recurse -File | Sort-Object LastWriteTime -Descending | Select-Object -First 3 | ForEach-Object {
                      Write-Host "--- $($_.FullName) ---"
                      Get-Content $_.FullName -Tail 50 -ErrorAction SilentlyContinue
                  }
              } else {
                  Write-Host "(no trace logs found)"
              }

              if (-not $proc.HasExited) {
                  Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
                  Write-Host "AppHost stopped."
              }

              if (-not $healthy) {
                  Write-Error "Gallery did not become healthy within $maxWait seconds."
                  exit 1
              }
              Write-Host "Aspire AppHost CI verification succeeded."
            displayName: Start Aspire Host
            workingDirectory: $(NuGetGalleryPath)

  - stage: artifacts
    displayName: Artifacts
    dependsOn: []
    jobs:
      - job: build_artifacts
        displayName: build
        cancelTimeoutInMinutes: 1
        steps:
          - checkout: self
            fetchDepth: 1
            clean: true
            fetchTags: false
            path: $(NuGetGalleryDirectory)
          - task: PowerShell@1
            name: build_artifacts
            displayName: Build
            inputs:
              scriptName: $(NuGetGalleryPath)\build.ps1
              arguments: -Configuration $(BuildConfiguration) -BuildNumber $(Build.BuildId) -CommonAssemblyVersion $(CommonAssemblyVersion) -CommonPackageVersion $(CommonPackageVersion) -GalleryAssemblyVersion $(GalleryAssemblyVersion) -GalleryPackageVersion $(GalleryPackageVersion) -JobsAssemblyVersion $(JobsAssemblyVersion) -JobsPackageVersion $(JobsPackageVersion) -Branch $(NuGetGalleryBranch) -CommitSHA $(Build.SourceVersion)
              workingFolder: $(NuGetGalleryPath)
